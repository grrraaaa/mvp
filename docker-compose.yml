services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sber
      POSTGRES_PASSWORD: sber
      POSTGRES_DB: sber
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sber -d sber"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ai:/ai
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-openai/gpt-4o-mini}
      - OPENROUTER_SITE_URL=${OPENROUTER_SITE_URL:-http://localhost:3000}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME:-SberAI Assistant}
      - DATABASE_URL=postgresql+asyncpg://sber:sber@postgres:5432/sber
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_ORIGINS=http://localhost:3000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
